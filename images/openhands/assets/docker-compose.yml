services:
  openhands:
    image: ghcr.io/openhands/openhands:e073659
    container_name: openhands-app
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      AGENT_SERVER_IMAGE_REPOSITORY: ghcr.io/openhands/agent-server
      AGENT_SERVER_IMAGE_TAG: 1.24.0-python
      WORKSPACE_MOUNT_PATH: $PWD/workspace
      OH_PERMITTED_CORS_ORIGINS_0: "http://${HOST_IP:-localhost}:3000"
      OH_PERMITTED_CORS_ORIGINS_1: "http://localhost:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/data:/.openhands
      - ~/workspace:/opt/workspace_base
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openhands-network
    depends_on:
      neo4j:
        condition: service_healthy
      mcp-neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    ports:
      - "127.0.0.1:7474:7474"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j1234}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - openhands-network

  mcp-neo4j:
    image: mcp/neo4j-cypher
    container_name: mcp-neo4j
    environment:
      NEO4J_URL: "bolt://neo4j:7687"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-neo4j1234}"
      NEO4J_DATABASE: "neo4j"
      NEO4J_TRANSPORT: "http"
      NEO4J_MCP_SERVER_HOST: "0.0.0.0"
      NEO4J_MCP_SERVER_PORT: "8000"
      NEO4J_MCP_SERVER_PATH: "/mcp/"
      NEO4J_READ_ONLY: "false"
      NEO4J_READ_TIMEOUT: "30"
      NEO4J_RESPONSE_TOKEN_LIMIT: "10000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/mcp/"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - openhands-network
    depends_on:
      neo4j:
        condition: service_healthy

networks:
  openhands-network:
    name: openhands-network
    driver: bridge

volumes:
  neo4j_data:
