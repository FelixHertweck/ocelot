services:
  litellm:
    image: ghcr.io/purpleailab/decepticon-litellm:1.1.6
    container_name: decepticon-litellm
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
      - ${CLAUDE_CREDENTIALS_VOLUME:-/dev/null}:/root/.claude/.credentials.json
      - ${CODEX_AUTH_VOLUME:-/dev/null}:/root/.codex/auth.json
    entrypoint: ["python", "/app/litellm_startup.py"]
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    env_file: .env
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-decepticon-master}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY:-sk-decepticon-salt}
      - CODEX_AUTH_PATH=/root/.codex/auth.json
      - DATABASE_URL=postgresql://decepticon:${POSTGRES_PASSWORD:-decepticon}@postgres:5432/litellm
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 300s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - decepticon-net
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: decepticon-postgres
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: decepticon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-decepticon}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=32MB"
      - "-c"
      - "work_mem=2MB"
      - "-c"
      - "effective_cache_size=128MB"
      - "-c"
      - "maintenance_work_mem=32MB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./containers/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - decepticon-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decepticon -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5.24-community
    container_name: decepticon-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-decepticon-graph}
      NEO4J_server_memory_heap_initial__size: 64m
      NEO4J_server_memory_heap_max__size: 256m
      NEO4J_server_memory_pagecache_size: 64m
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_dbms_security_procedures_allowlist: >-
        apoc.coll.*,apoc.text.*,apoc.path.*,apoc.create.*,
        apoc.merge.*,apoc.refactor.*,apoc.periodic.iterate,
        apoc.lock.*,apoc.case,apoc.do.case,apoc.do.when,apoc.when,
        apoc.help,apoc.version,apoc.diff.*,apoc.label.*,
        apoc.node.*,apoc.nodes.*,apoc.rel.*,apoc.util.*
      NEO4J_server_config_strict__validation_enabled: "true"
      NEO4J_server_http_listen__address: "0.0.0.0:7474"
      NEO4J_dbms_security_http__access__control__allow__origin: ""
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
    networks:
      - sandbox-net
      - decepticon-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s
    restart: unless-stopped

  sandbox:
    image: ghcr.io/purpleailab/decepticon-sandbox:1.1.6
    container_name: decepticon-sandbox
    networks:
      - sandbox-net
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - NET_BIND_SERVICE
    environment:
      - SANDBOX_DAEMON=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-decepticon-graph}
      - GHIDRA_INSTALL_DIR=/opt/ghidra
      - GHIDRA_MCP_URL=http://ghidra-mcp:8089
    volumes:
      - ~/.decepticon/workspace:/workspace
    pids_limit: 4096
    init: true
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  langgraph:
    image: ghcr.io/purpleailab/decepticon-langgraph:1.1.6
    container_name: decepticon-langgraph
    # $$ escapes compose interpolation — the if/else runs at container start, not compose render
    command:
      - sh
      - -c
      - >
        if [ -z "$${LANGGRAPH_STRICT_ASYNC:-}" ]; then
          exec langgraph dev --host 0.0.0.0 --port 2024 --no-browser --n-jobs-per-worker 10 --allow-blocking;
        else
          exec langgraph dev --host 0.0.0.0 --port 2024 --no-browser --n-jobs-per-worker 10;
        fi
    ports:
      - "${LANGGRAPH_PORT:-2024}:2024"
    env_file: .env
    environment:
      - DECEPTICON_LLM__PROXY_URL=http://litellm:4000
      - DECEPTICON_LLM__PROXY_API_KEY=${LITELLM_MASTER_KEY:-sk-decepticon-master}
      - SAAS_SANDBOX_URL=http://sandbox:9999
      - DECEPTICON_NEO4J_URI=bolt://neo4j:7687
      - DECEPTICON_NEO4J_USER=neo4j
      - DECEPTICON_NEO4J_PASSWORD=${NEO4J_PASSWORD:-decepticon-graph}
      - DECEPTICON_USE_SKILLOGY=${DECEPTICON_USE_SKILLOGY:-0}
      - DECEPTICON_SKILLOGY_URL=http://skillogy:9100
    volumes:
      - ${CLAUDE_CREDENTIALS_VOLUME:-/dev/null}:/root/.claude/.credentials.json:ro
      - ${CODEX_AUTH_VOLUME:-/dev/null}:/root/.codex/auth.json:ro
    depends_on:
      litellm:
        condition: service_healthy
      sandbox:
        condition: service_started
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2024/ok')"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 90s
    networks:
      - decepticon-net
      - sandbox-net
    restart: unless-stopped

  web:
    build:
      context: ${DECEPTICON_SRC_DIR:-.}
      dockerfile: containers/web.Dockerfile
      network: host
      args:
        VERSION: ${VERSION:-0.0.0}
    image: ghcr.io/purpleailab/decepticon-web:1.1.6
    container_name: decepticon-web
    ports:
      - "${WEB_PORT:-3000}:3000"
      - "${TERMINAL_PORT:-3003}:3003"
    env_file: .env
    environment:
      - NEXT_PUBLIC_DECEPTICON_EDITION=oss
      - LANGGRAPH_API_URL=http://langgraph:2024
      - DATABASE_URL=postgresql://decepticon:${POSTGRES_PASSWORD:-decepticon}@postgres:5432/decepticon_web
      - WORKSPACE_PATH=/workspace
    volumes:
      - ~/.decepticon/workspace:/workspace
    depends_on:
      langgraph:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => { r.resume(); process.exit(r.statusCode < 500 ? 0 : 1); }).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - decepticon-net
    restart: unless-stopped

  cli:
    image: ghcr.io/purpleailab/decepticon-cli:1.1.6
    container_name: decepticon-cli
    stdin_open: true
    tty: true
    environment:
      - DECEPTICON_API_URL=http://langgraph:2024
      - TERM=xterm-256color
      - COLORTERM=truecolor
      - DECEPTICON_VERSION=1.1.6
    depends_on:
      langgraph:
        condition: service_healthy
    networks:
      - decepticon-net
    profiles:
      - cli

  c2-sliver:
    image: ghcr.io/purpleailab/decepticon-c2-sliver:1.1.6
    container_name: decepticon-c2-sliver
    networks:
      - sandbox-net
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - sliver_data:/home/sliver/.sliver
    pids_limit: 512
    restart: unless-stopped
    profiles:
      - c2-sliver

  skillogy:
    image: ghcr.io/purpleailab/decepticon-skillogy:1.1.6
    container_name: decepticon-skillogy
    ports:
      - "9100:9100"
      - "50051:50051"
    environment:
      - SKILLOGY_REST_PORT=9100
      - SKILLOGY_GRPC_PORT=50051
      - SKILLOGY_SKILLS_ROOT=/app/skills
    volumes:
      - ~/.decepticon/custom-skills:/app/skills/custom:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/v1/health')"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    networks:
      - decepticon-net
    restart: unless-stopped

volumes:
  postgres_data:
  sliver_data:
  neo4j_data:
  neo4j_logs:

networks:
  decepticon-net:
    driver: bridge
  sandbox-net:
    driver: bridge
