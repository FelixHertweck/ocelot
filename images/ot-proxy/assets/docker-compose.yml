services:
  ot-proxy:
    image: ghcr.io/felixhertweck/ocelot-ot-proxy:main
    container_name: ot-proxy
    ports:
      - "${OT_PROXY_MODBUS_PORT:-5020}:5020"
      - "${OT_PROXY_IEC61850_PORT:-102}:102"
    volumes:
      - ./proxy-config.yml:/app/proxy-config.yml:ro
    env_file:
      - path: .env
        required: false
    environment:
      - JAVA_OPTS=${JAVA_OPTS:--Xmx128m}
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - ot-proxy-net

networks:
  ot-proxy-net:
    driver: bridge
