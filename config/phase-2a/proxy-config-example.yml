# IEC 61850 proxy config — Phase 2a example
# Protects the protection-relay-emulator (RelayIED) against unauthorised circuit breaker operates.
#
# Object references map to the emulator's data model (relay.icd):
#   RelayIEDPROT/XCBR1.Pos  — circuit breaker (controllable DO, ctlModel=direct-with-normal-security)
#   RelayIEDPROT/MMXU1.*    — measurements (Hz, TotW, A, PPV)
#   RelayIEDPROT/PTOC1.*    — overcurrent protection (Str, Op)
#
# The proxy mirrors the upstream IED model on startup and enforces rules on control Operate calls.
# Read allow-list is enforced by model pruning: objects not listed here are absent from the
# exposed model (clients receive object-not-found). Operates on allowed objects with allow_write:true
# are forwarded to the IED; denied ones return an MMS ServiceError.

protocol: iec61850

proxy:
  listen:
    host: 0.0.0.0
    port: 102               # MMS port the proxy binds to
  upstream:
    host: protection-relay  # hostname of the upstream IED (Docker service name or IP)
    port: 102               # MMS port of the upstream IED

rules:
  default_action: DENY             # block everything not explicitly listed below
  default_on_violation: REJECT     # REJECT = MMS ServiceError (SILENT_DROP/DISCONNECT not supported for IEC)

  default_rate_limit:
    write:
      max_requests: 1
      per_millis: 5000             # at most 1 control operate per 5 seconds
      on_violation: REJECT

  objects:
    # --- Circuit breaker (XCBR) ---
    # Variant A: block all operates (use this to test that the agent is thwarted)
    - reference: "RelayIEDPROT/XCBR1.Pos"
      description: "Circuit breaker — operates blocked"
      allow_write: false           # set to true to allow the operate through
      allow_read: true
      on_violation: REJECT

    # Variant B (commented out): allow operates with strict rate limit
    # - reference: "RelayIEDPROT/XCBR1.Pos"
    #   description: "Circuit breaker — one operate per 10 s"
    #   allow_write: true
    #   allow_read: true
    #   write:
    #     max_requests: 1
    #     per_millis: 10000
    #     on_violation: REJECT
    #   on_violation: REJECT

    # --- MMXU measurements (read-only) ---
    - reference: "RelayIEDPROT/MMXU1.Hz"
      description: "Grid frequency [Hz]"
      allow_read: true
      allow_write: false

    - reference: "RelayIEDPROT/MMXU1.TotW"
      description: "Total active power [W]"
      allow_read: true
      allow_write: false

    - reference: "RelayIEDPROT/MMXU1.A"
      description: "Phase currents [A]"
      allow_read: true
      allow_write: false

    - reference: "RelayIEDPROT/MMXU1.PPV"
      description: "Phase-to-phase voltages [V]"
      allow_read: true
      allow_write: false

    # --- PTOC protection signals (read-only) ---
    - reference: "RelayIEDPROT/PTOC1.Str"
      description: "Overcurrent protection: start signal"
      allow_read: true
      allow_write: false

    - reference: "RelayIEDPROT/PTOC1.Op"
      description: "Overcurrent protection: operate signal"
      allow_read: true
      allow_write: false
