# IEC 61850 proxy config — Phase 2a
# Protects the SIPROTEC 5 emulator against unauthorised circuit breaker operates.
#
# Object references map to the emulator's data model (relay.icd, IED name SIP1):
#   SIP1CB1/XCBR1.Pos                          — circuit breaker (ctlModel=direct-with-normal-security)
#   SIP1CB1/CSWI1.Pos                          — switch controller (read-only)
#   SIP1VI3p1_OperationalValues/PPRE_MMXU1.*   — power/frequency (Hz, TotW)
#   SIP1VI3p1_OperationalValues/RPRE_MMXU1.*   — currents/voltages (A, PPV)
#   SIP1VI3p1_5051OC3phase1/ID_PTOC1.*         — overcurrent protection (Str, Op)
#
# The proxy mirrors the upstream IED model on startup and enforces rules on control Operate calls.
# Read allow-list is enforced by model pruning: objects not listed here are absent from the
# exposed model (clients receive object-not-found). Operates on allowed objects with allow_write:true
# are forwarded to the IED; denied ones return an MMS ServiceError.

protocol: iec61850

proxy:
  listen:
    host: 0.0.0.0
    port: 102               # MMS port the proxy binds to
  upstream:
    host: protection-relay  # hostname of the upstream IED — use Docker service name or IP
    port: 102               # MMS port of the upstream IED

rules:
  default_action: DENY             # block everything not explicitly listed below
  default_on_violation: REJECT     # REJECT = MMS ServiceError (SILENT_DROP/DISCONNECT not supported for IEC)

  default_rate_limit:
    write:
      max_requests: 5
      per_millis: 100             # at most 5 control operate per 100 milliseconds
      on_violation: REJECT

  objects:
    # --- Circuit breaker status (XCBR, read-only) ---
    # ctlModel=0 on physical SIPROTEC: XCBR1 is not directly controllable.
    # Control is issued via CSWI1 (the switch controller) below.
    - reference: "SIP1CB1/XCBR1.Pos"
      description: "Circuit breaker position — status only"
      allow_read: true
      allow_write: false

    # --- Switch controller (CSWI) — actual control path on physical SIPROTEC ---
    # ctlModel=4 (sbo-with-enhanced-security) on physical device;
    # the proxy downgrades this to ctlModel=2 (sbo-with-normal-security) for downstream clients.
    #
    # Variant A (commented out): block all operates
    # - reference: "SIP1CB1/CSWI1.Pos"
    #   description: "Switch controller — operates blocked"
    #   allow_read: true
    #   allow_write: false

    # Variant B: allow operates with strict rate limit
    - reference: "SIP1CB1/CSWI1.Pos"
      description: "Switch controller — one operate per 10 s"
      allow_write: true
      allow_read: true
      write:
        max_requests: 1
        per_millis: 10000
        on_violation: REJECT

    # --- MMXU measurements (read-only) ---
    - reference: "SIP1VI3p1_OperationalValues/PPRE_MMXU1.Hz"
      description: "Grid frequency [Hz]"
      allow_read: true
      allow_write: false

    - reference: "SIP1VI3p1_OperationalValues/PPRE_MMXU1.TotW"
      description: "Total active power [W]"
      allow_read: true
      allow_write: false

    - reference: "SIP1VI3p1_OperationalValues/RPRE_MMXU1.A"
      description: "Phase currents [A]"
      allow_read: true
      allow_write: false

    - reference: "SIP1VI3p1_OperationalValues/RPRE_MMXU1.PPV"
      description: "Phase-to-phase voltages [V]"
      allow_read: true
      allow_write: false

    # --- PTOC protection signals (read-only) ---
    - reference: "SIP1VI3p1_5051OC3phase1/ID_PTOC1.Str"
      description: "Overcurrent protection: start signal"
      allow_read: true
      allow_write: false

    - reference: "SIP1VI3p1_5051OC3phase1/ID_PTOC1.Op"
      description: "Overcurrent protection: operate signal"
      allow_read: true
      allow_write: false
