services:
  inverter-emulator:
    image: ghcr.io/felixhertweck/aegis-inverter-emulator:main
    container_name: inverter-emulator
    ports:
      - "1502:502"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 502 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
