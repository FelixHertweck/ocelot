server {
    listen 80;
    server_name _;

    root /var/www/gateway;
    index dashboard.html;

    # Apply Basic Auth to all routes by default
    auth_basic "OT Management Gateway -- Restricted Access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Health check: no auth required
    location = /health {
        auth_basic off;
        access_log off;
        default_type text/plain;
        return 200 "OK\n";
    }

    # Dashboard and static assets
    location / {
        try_files $uri $uri/ =404;
    }

    # JSON API responses with correct content type
    location /api/v1/ {
        default_type application/json;
        try_files $uri $uri.json =404;
    }

    # SSH private key download — served from volume-mounted protected directory
    location = /api/v1/credentials/gateway-key {
        alias /var/www/protected/gateway_rsa;
        add_header Content-Type application/octet-stream;
        add_header Content-Disposition 'attachment; filename="gateway_rsa"';
    }
}
