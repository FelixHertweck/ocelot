proxy:
  listen:
    host: 0.0.0.0
    port: 5020
  upstream:
    host: 192.168.1.10
    port: 502

rules:
  default_action: DENY   # Block any register not explicitly listed below
  # Fallback on_violation when a register/limit sets none (else MODBUS_EXCEPTION).
  default_on_violation: MODBUS_EXCEPTION

  # Read/write throttle for registers without their own read/write block (ms window).
  default_rate_limit:
    write:
      max_requests: 1
      per_millis: 100
      on_violation: MODBUS_EXCEPTION
    read:
      max_requests: 10
      per_millis: 1000
      on_violation: MODBUS_EXCEPTION

  registers:
    - address: 100
      description: "Pump speed setpoint"
      allow_write: true
      value_range:
        min: 0
        max: 1500
      write:
        max_requests: 10
        per_millis: 60000
      on_violation: MODBUS_EXCEPTION

    - address: 101
      description: "Pump on/off coil"
      allow_write: true
      value_range:
        min: 0
        max: 1
      on_violation: MODBUS_EXCEPTION

    - address: 200
      description: "Emergency stop (read-only)"
      allow_write: false
      on_violation: DISCONNECT

    - address: 300
      description: "Temperature setpoint (rate-limited)"
      allow_write: true
      value_range:
        min: -20
        max: 120
      write:
        max_requests: 5
        per_millis: 60000
      on_violation: SILENT_DROP
