name: OT-Management-Gateway — Build & Publish

on:
  push:
    branches: ["main"]
    paths:
      - "ot-management-gateway/**"
      - "!ot-management-gateway/**/*.md"
      - ".github/workflows/ot-management-gateway.yml"
    tags:
      - "v*.*"
      - "v*.*.*"
  pull_request:
    branches: ["main"]
    paths:
      - "ot-management-gateway/**"
      - "!ot-management-gateway/**/*.md"
      - ".github/workflows/ot-management-gateway.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    name: Docker Build & Publish
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}-ot-management-gateway

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install cosign
        if: ${{ github.event_name != 'pull_request' }}
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: "v2.4.3"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=ot-management-gateway
            org.opencontainers.image.authors=Felix Hertweck

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          file: ot-management-gateway/Dockerfile
          context: ot-management-gateway
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
